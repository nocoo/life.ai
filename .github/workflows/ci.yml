name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@aec4adc1a817c56790d1698329ef9398a15a754a  # v2026.5
    with:
      ignore-scripts: true
      trusted-native-deps: "better-sqlite3"
      extra-install-dirs: "dashboard"
      test-command: "bun run test:coverage"
      lint-command: "bun run lint"
      typecheck-command: "true"
      enable-l2: "true"
      l2-command: "bun run test:l2"
      enable-l3: "true"
      l3-command: "bun run test:e2e:bdd"
      l3-browser: "chromium"
    secrets: inherit
